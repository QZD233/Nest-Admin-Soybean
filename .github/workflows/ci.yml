name: CI

on:
  push:
    branches:
      - main
      - main-refactor
      - develop
  pull_request:
    branches:
      - main
      - main-refactor

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @nest-admin/server prisma:generate

      - name: Build shared types
        run: pnpm --filter @nest-admin/types build

      - name: Build server
        run: pnpm --filter @nest-admin/server build

      - name: Build web (Coolify mode)
        run: NODE_OPTIONS=--max-old-space-size=4096 pnpm --filter @nest-admin/web build:coolify

  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build compose images
        run: docker compose build server web
