name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - main-refactor
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  BRANCH_NAME: ${{ github.event.workflow_run.head_branch || github.ref_name }}
  COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
  COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}

jobs:
  publish-and-deploy:
    name: Publish Images And Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: ${{ (github.event.workflow_run.head_branch || github.ref_name) == 'main' && 'production' || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/nest-admin-server:${{ env.COMMIT_SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/nest-admin-server:${{ env.BRANCH_NAME }}-latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/nest-admin-web:${{ env.COMMIT_SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/nest-admin-web:${{ env.BRANCH_NAME }}-latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Trigger Coolify deployment
        if: ${{ env.COOLIFY_DEPLOY_WEBHOOK != '' }}
        run: |
          if [ -n "${COOLIFY_TOKEN}" ]; then
            curl --fail --silent --show-error --request GET "${COOLIFY_DEPLOY_WEBHOOK}" \
              --header "Authorization: Bearer ${COOLIFY_TOKEN}"
          else
            curl --fail --silent --show-error --request GET "${COOLIFY_DEPLOY_WEBHOOK}"
          fi
